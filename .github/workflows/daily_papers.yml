name: 📡 Paper Radar — Daily Report

on:
  schedule:
    # 12:00 UTC = 7:00 AM Colombia (UTC-5)
    - cron: '0 12 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write  # needed to commit reports back to the repo

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No external dependencies — script uses stdlib only

      - name: 🚀 Generate paper reports
        env:
          REPORTS_DIR: reports
        run: |
          python scripts/fetch_papers.py

      - name: 📧 Email the filtered report
        env:
          REPORTS_DIR: reports
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python scripts/send_email.py

      - name: 📤 Commit and push reports
        run: |
          git config --local user.email "alexbuitrago156@gmail.com"
          git config --local user.name "AlexProyer"

          git add reports/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit today."
          else
            git commit -m "📡 Paper Radar — $(date -u +%Y-%m-%d)"
            git push
          fi
